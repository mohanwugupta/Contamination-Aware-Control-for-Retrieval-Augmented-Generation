# Smoke test — FaithEval (all subtasks), DENSE retrieval, 5 examples
#
# Pipeline components exercised:
#   ✅ Dense retriever   — SentenceTransformer (BAAI/bge-base-en-v1.5) + FAISS
#   ❌ Reranker          — off (tested by smoke_test_ramdocs)
#
# FaithEval bundles one context per example (unanswerable / inconsistent /
# counterfactual).  get_corpus() exposes those contexts for dense retrieval.
# top_k=1 is intentional: there is exactly one relevant passage per example.
# answer_mode: unknown_or_abstain covers unanswerable and inconsistent subtasks.
dataset: faitheval
split: test
retriever_type: dense
reranker_enabled: false
generator_model: Qwen/Qwen--Qwen3-32B
prompt_family: unknown_compatible
top_k_retrieval: 1
top_k_after_rerank: 1
context_strategy: full
answer_mode: unknown_or_abstain
output_dir: outputs/smoke_test_faitheval
random_seed: 42
dense_model: BAAI/bge-base-en-v1.5
vllm_base_url: http://localhost:8000/v1
