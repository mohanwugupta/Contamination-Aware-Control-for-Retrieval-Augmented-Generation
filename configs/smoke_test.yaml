# Smoke test — NQ-Open, LLM-ONLY (no retrieval), 5 examples
#
# Pipeline components exercised:
#   ❌ Retriever         — none (LLM-only baseline)
#   ❌ Reranker          — off
#
# This is the simplest possible end-to-end path: question → prompt →
# generator → evaluate.  It validates the LLM server, prompt formatting,
# and output serialisation without any retrieval machinery.
dataset: nq_open
split: validation
retriever_type: none
reranker_enabled: false
generator_model: Qwen/Qwen--Qwen3-32B
prompt_family: single_answer
top_k_retrieval: 0
top_k_after_rerank: 0
context_strategy: none
answer_mode: single
output_dir: outputs/smoke_test
random_seed: 42
vllm_base_url: http://localhost:8000/v1
