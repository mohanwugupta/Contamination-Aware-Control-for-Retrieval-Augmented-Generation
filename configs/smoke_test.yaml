# Smoke test — NQ-Open, LLM-ONLY (no retrieval), 5 examples
#
# Pipeline components exercised:
#   ✅ LLM-only path     — no retriever, no reranker, no corpus indexing
#   ❌ Retrieval         — off (NQ-Open has no bundled corpus)
#
# Uses NQ-Open in LLM-only mode to verify the cluster environment end-to-end
# without requiring a retrieval index or any cached model weights beyond vLLM.
# Used by slurm/smoke_test.sh
dataset: nq_open
split: validation
retriever_type: none
reranker_enabled: false
generator_model: Qwen/Qwen--Qwen3-32B
prompt_family: single_answer
top_k_retrieval: 0
top_k_after_rerank: 0
context_strategy: none
answer_mode: single
output_dir: outputs/smoke_test
random_seed: 42
vllm_base_url: http://localhost:8000/v1
