# Baseline C — Hybrid RAG + Reranker (PRD 1 §5)
# Hybrid retrieval, cross-encoder reranking, full context
# This is the main strong baseline for PRD 1
dataset: ambigdocs
split: validation
retriever_type: hybrid
reranker_enabled: true
generator_model: Qwen/Qwen2.5-32B-Instruct
prompt_family: multi_answer
top_k_retrieval: 10
top_k_after_rerank: 5
context_strategy: full
answer_mode: multi
output_dir: outputs/hybrid_rerank
random_seed: 42
dense_model: BAAI/bge-base-en-v1.5
reranker_model: BAAI/bge-reranker-v2-m3
vllm_base_url: http://localhost:8000/v1
