# Smoke test — LLM-only config, 5 examples only
# Uses NQ-Open (no bundled corpus) in LLM-only mode to verify the cluster
# environment end-to-end without requiring a retrieval index.
# Used by slurm/smoke_test.sh
dataset: nq_open
split: validation
retriever_type: none
reranker_enabled: false
generator_model: Qwen/Qwen--Qwen3-32B
prompt_family: single_answer
top_k_retrieval: 0
top_k_after_rerank: 0
context_strategy: none
answer_mode: single
output_dir: outputs/smoke_test
random_seed: 42
vllm_base_url: http://localhost:8000/v1
generator_max_tokens: 64
